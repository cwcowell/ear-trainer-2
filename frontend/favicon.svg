<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#2c7be5"/>
  <!-- Quarter note: filled oval notehead + stem -->
  <!-- Notehead -->
  <ellipse cx="15" cy="22" rx="4.5" ry="3.2" transform="rotate(-20 13 22)" fill="white"/>
  <!-- Stem (right edge aligns with right side of notehead) -->
  <rect x="16.9" y="8" width="2.2" height="14" fill="white"/>
</svg>
