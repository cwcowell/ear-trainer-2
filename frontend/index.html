<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ear Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Besley:wght@400;700&family=Libre+Franklin:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/vexflow@4/build/cjs/vexflow.js"></script>
</head>
<body>
  <!-- SCREEN: Main Menu -->
  <div id="screen-menu" class="screen active">
    <h1>Ear Trainer</h1>
    <nav class="menu-list">
      <button class="menu-item" data-screen="interval">Intervals</button>
      <button class="menu-item" data-screen="keysig">Key Signatures</button>
    </nav>
  </div>

  <!-- SCREEN: Interval Training -->
  <div id="screen-interval" class="screen">
    <header>
      <h2>Intervals</h2>
      <div id="score-display">0 / 0</div>
    </header>

    <div id="interval-buttons" class="interval-grid">
      <!-- 12 buttons injected by JS -->
    </div>

    <footer>
      <button id="btn-quit" class="btn-secondary">Quit</button>
      <button id="btn-play" class="btn-primary">Replay</button>
      <button id="btn-waveform" class="btn-secondary" title="Toggle waveform">Square</button>
    </footer>
  </div>

  <!-- SCREEN: Key Signatures -->
  <div id="screen-keysig" class="screen">
    <header>
      <h2>Key Signatures</h2>
      <div id="keysig-score-display">0 / 0</div>
    </header>

    <div id="keysig-play-area">
      <div id="keysig-staff"></div>
    </div>

    <div id="keysig-buttons" class="keysig-grid">
      <!-- 15 buttons injected by JS -->
    </div>

    <footer>
      <button id="btn-keysig-quit" class="btn-secondary">Quit</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
